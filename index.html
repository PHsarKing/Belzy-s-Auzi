<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise</title>

<style>

body{
margin:0;
height:100vh;
background:black;
font-family: 'Courier New', monospace;
overflow:hidden;
}

/* INTRO SCREEN */

#intro{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
color:white;
font-size:32px;
letter-spacing:2px;
animation:introFade 4s forwards;
}

@keyframes introFade{
0%{opacity:1;}
70%{opacity:1;}
100%{opacity:0;}
}

/* MAIN SCENE */

#main{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
align-items:center;
background:linear-gradient(180deg,#ff5d7a,#ff6f91);
color:white;
opacity:0;
animation:showMain 2s forwards;
animation-delay:4s;
}

@keyframes showMain{
to{opacity:1;}
}

/* TITLE */

h1{
margin-top:60px;
font-size:60px;
}

/* MESSAGE */

.message{
position:relative;
top:-40px;
font-size:22px;
}

/* PHOTOS */

.photo{
position:absolute;
width:120px;
height:120px;
border-radius:20px;
object-fit:cover;
box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

#p1{ top:150px; left:8%; }
#p2{ top:150px; right:8%; }
#p3{ bottom:140px; left:12%; }
#p4{ bottom:140px; right:12%; }

/* CAKE */

.cake{
position:relative;
width:220px;
margin-top:120px;
top:80px;
transform: perspective(800px) rotateX(8deg);
}

/* LAYERS */

.layer{
position:absolute;
width:220px;
height:60px;
background:linear-gradient(to bottom,#ffc2d1,#ff8fab);
border-radius:14px;
box-shadow:
0 12px 20px rgba(0,0,0,0.25),
inset 0 -8px 15px rgba(0,0,0,0.1),
inset 0 6px 10px rgba(255,255,255,0.5);
}

.l1{ top:120px; }
.l2{ top:70px; }
.l3{ top:20px; }

/* ICING */

.icing{
position:absolute;
top:10px;
width:220px;
height:25px;
background:linear-gradient(to bottom,#ffffff,#ffe5ec);
border-radius:12px;
}

/* CANDLE */

.candle{
position:absolute;
top:-35px;
left:50%;
transform:translateX(-50%);
width:10px;
height:40px;
background:#ff4d6d;
}

.flame{
position:absolute;
top:-18px;
left:-2px;
width:14px;
height:18px;
background:radial-gradient(circle,#fff200,orange,red);
border-radius:50%;
box-shadow:
0 0 20px orange,
0 0 40px gold;
animation:flicker .18s infinite alternate;
}

@keyframes flicker{
from{transform:scale(1);}
to{transform:scale(1.15);}
}

/* SHADOW */

.cake::after{
content:"";
position:absolute;
bottom:-35px;
left:50%;
transform:translateX(-50%);
width:180px;
height:30px;
background:rgba(0,0,0,0.25);
filter:blur(15px);
border-radius:50%;
}

</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
Loading something special...
</div>

<!-- MAIN -->
<div id="main">

<h1>Happy Birthday Ko Doi!</h1>

<p class="message">I made this little program just for you ❤️</p>

<img src="photo1.jpg" class="photo" id="p1">
<img src="photo2.jpg" class="photo" id="p2">
<img src="photo3.jpg" class="photo" id="p3">
<img src="photo4.jpg" class="photo" id="p4">

<div class="cake">
<div class="layer l1"></div>
<div class="layer l2"></div>
<div class="layer l3"></div>
<div class="icing"></div>

<div class="candle">
<div class="flame"></div>
</div>

</div>

</div>

</body>
</html>

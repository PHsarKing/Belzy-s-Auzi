<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise</title>

<style>
body{
margin:0;
height:100vh;
background:black;
font-family: monospace;
overflow:hidden;
color:#00ff9d;
}

/* FAKE CODING SCREEN */

#codeScreen{
position:absolute;
width:100%;
height:100%;
padding:40px;
box-sizing:border-box;
font-size:18px;
line-height:1.6;
}

/* MAIN SCENE */

#main{
position:absolute;
width:100%;
height:100%;
background:linear-gradient(180deg,#ff5d7a,#ff6f91);
display:flex;
flex-direction:column;
align-items:center;
color:white;
opacity:0;
transition:1s;
}

h1{
margin-top:60px;
font-size:55px;
}

.message{
margin-top:-20px;
font-size:22px;
}

/* CAKE */

.cake{
position:relative;
width:220px;
margin-top:120px;
}

.layer{
position:absolute;
width:220px;
height:60px;
background:linear-gradient(to bottom,#ffc2d1,#ff8fab);
border-radius:14px;
}

.l1{ top:120px; }
.l2{ top:70px; }
.l3{ top:20px; }

.icing{
position:absolute;
top:10px;
width:220px;
height:25px;
background:white;
border-radius:12px;
}

.candle{
position:absolute;
top:-35px;
left:50%;
transform:translateX(-50%);
width:10px;
height:40px;
background:#ff4d6d;
}

.flame{
position:absolute;
top:-18px;
left:-2px;
width:14px;
height:18px;
background:radial-gradient(circle,yellow,orange,red);
border-radius:50%;
animation:flicker .2s infinite alternate;
}

@keyframes flicker{
from{transform:scale(1);}
to{transform:scale(1.2);}
}
</style>
</head>

<body>

<div id="codeScreen">
<pre id="code"></pre>
</div>

<div id="main">

<h1>Happy Birthday Ko Doi!</h1>
<p class="message">This program was made just for you ❤️</p>

<div class="cake">
<div class="layer l1"></div>
<div class="layer l2"></div>
<div class="layer l3"></div>
<div class="icing"></div>
<div class="candle">
<div class="flame"></div>
</div>
</div>

</div>

<script>

const lines = [
"Initializing birthday protocol...",
"Loading memories...",
"Connecting to heart.exe",
"Bypassing sadness firewall...",
"Compiling happiness...",
"Injecting love variables...",
"Creating surprise...",
"Done.",
"",
"> Launching Birthday Program..."
];

let i = 0;
let j = 0;
const speed = 35;
const codeElement = document.getElementById("code");

function type(){
if(i < lines.length){
if(j < lines[i].length){
codeElement.innerHTML += lines[i].charAt(j);
j++;
setTimeout(type, speed);
}else{
codeElement.innerHTML += "\n";
i++;
j = 0;
setTimeout(type, 200);
}
}else{
setTimeout(showMain, 800);
}
}

function showMain(){
document.getElementById("codeScreen").style.display="none";
document.getElementById("main").style.opacity="1";
}

type();

</script>

</body>
</html>

```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Birthday Program</title>

<style>

body{
margin:0;
background:#000;
color:#00ff9c;
font-family: "Courier New", monospace;
overflow:hidden;
}

/* TERMINAL */

#terminal{
padding:40px;
font-size:18px;
line-height:1.6;
white-space:pre-line;
}

/* SCENE */

#scene{
display:none;
height:100vh;
background:radial-gradient(circle at center,#ff8fab,#ff4d6d);
text-align:center;
color:white;
position:relative;
overflow:hidden;
}

h1{
margin-top:40px;
font-size:48px;
}

/* CAKE */

.cake{
position:relative;
width:220px;
margin:40px auto;
transform:scale(0);
transition:1.2s ease;
}

.layer{
position:absolute;
width:220px;
height:60px;
background:#ffb3c6;
border-radius:12px;
opacity:0;
}

.l1{top:130px;}
.l2{top:90px;}
.l3{top:50px;}

.icing{
position:absolute;
top:40px;
width:220px;
height:20px;
background:white;
border-radius:10px;
opacity:0;
}

.candle{
position:absolute;
top:-5px;
left:105px;
width:10px;
height:45px;
background:#ff4d6d;
border-radius:5px;
opacity:0;
}

.flame{
position:absolute;
top:-20px;
left:-1px;
width:12px;
height:18px;
background:gold;
border-radius:50%;
opacity:0;
animation:flicker .25s infinite alternate;
}

@keyframes flicker{
from{transform:scale(1);}
to{transform:scale(1.25);}
}

/* PHOTOS AROUND CAKE */

.photo{
position:absolute;
width:110px;
height:110px;
object-fit:cover;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
opacity:0;
transform:scale(.5);
transition:1s;
}

/* CONFETTI */

.confetti{
position:absolute;
width:7px;
height:7px;
animation:fall linear infinite;
}

@keyframes fall{
0%{transform:translateY(-10vh);}
100%{transform:translateY(110vh);}
}

/* HEARTS */

.heart{
position:absolute;
font-size:20px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh);}
100%{transform:translateY(-10vh);}
}

.message{
max-width:600px;
margin:auto;
font-size:20px;
padding:10px 20px;
}

</style>
</head>

<body>

<div id="terminal"></div>

<div id="scene">

<h1>Happy Birthday</h1>

<div class="cake" id="cake">
<div class="layer l1" id="l1"></div>
<div class="layer l2" id="l2"></div>
<div class="layer l3" id="l3"></div>
<div class="icing" id="icing"></div>

<div class="candle" id="candle">
<div class="flame" id="flame"></div>
</div>
</div>

<p class="message">
I made this little program just for you ❤️
</p>

<!-- PHOTOS -->
<img src="photo1.jpg" class="photo" id="p1" style="top:100px; left:10%;">
<img src="photo2.jpg" class="photo" id="p2" style="top:120px; right:10%;">
<img src="photo3.jpg" class="photo" id="p3" style="bottom:120px; left:15%;">
<img src="photo4.jpg" class="photo" id="p4" style="bottom:110px; right:15%;">

</div>

<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<script>

/* TERMINAL TEXT (very similar to video style) */

let text = `
booting loveOS...

checking date...

✔ birthday detected

loading surprise modules...

building cake...

loading memories...

run surprise.exe
`;

let i=0;

function type(){
if(i<text.length){
document.getElementById("terminal").innerHTML += text.charAt(i);
i++;
setTimeout(type,30);
}else{
setTimeout(startScene,1000);
}
}

type();

/* START SCENE */

function startScene(){

document.getElementById("terminal").style.display="none";
document.getElementById("scene").style.display="block";

document.getElementById("music").play();

buildCake();

}

/* CAKE BUILD ANIMATION */

function buildCake(){

let cake=document.getElementById("cake");
cake.style.transform="scale(1)";

setTimeout(()=>l1.style.opacity=1,500);
setTimeout(()=>l2.style.opacity=1,1000);
setTimeout(()=>l3.style.opacity=1,1500);
setTimeout(()=>icing.style.opacity=1,2000);
setTimeout(()=>candle.style.opacity=1,2500);
setTimeout(()=>flame.style.opacity=1,3000);
setTimeout(showPhotos,3400);
setTimeout(confettiExplosion,3500);

}

/* PHOTOS APPEAR */

function showPhotos(){

document.querySelectorAll(".photo").forEach(p=>{
p.style.opacity=1;
p.style.transform="scale(1)";
});

}

/* CONFETTI */

function confettiExplosion(){

for(let i=0;i<70;i++){
let c=document.createElement("div");
c.className="confetti";
c.style.left=Math.random()*100+"vw";
c.style.background=`hsl(${Math.random()*360},100%,50%)`;
c.style.animationDuration=(2+Math.random()*3)+"s";
document.body.appendChild(c);
}

/* floating hearts */

setInterval(()=>{
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"vw";
document.body.appendChild(heart);
setTimeout(()=>heart.remove(),6000);
},600);

}

</script>

</body>
</html>
```

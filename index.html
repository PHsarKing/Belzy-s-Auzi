<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise</title>

<style>

body{
margin:0;
height:100vh;
background:black;
font-family:monospace;
overflow:hidden;
}

/* FAKE CODING INTRO */

#intro{
position:absolute;
width:100%;
height:100%;
padding:40px;
color:#00ff9d;
background:black;
font-size:18px;
line-height:1.6;
}

/* MAIN PAGE */

#main{
position:absolute;
width:100%;
height:100%;
background:linear-gradient(180deg,#ff5d7a,#ff6f91);
display:flex;
flex-direction:column;
align-items:center;
color:white;
opacity:0;
transition:1s;
}

/* TITLE */

h1{
margin-top:60px;
font-size:55px;
}

/* MESSAGE */

.message{
margin-top:-10px;
font-size:22px;
}

/* PHOTOS */

.photo{
position:absolute;
width:120px;
height:120px;
border-radius:20px;
object-fit:cover;
box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

#p1{ top:150px; left:8%; }
#p2{ top:150px; right:8%; }
#p3{ bottom:140px; left:12%; }
#p4{ bottom:140px; right:12%; }

/* CAKE */

.cake{
position:relative;
width:220px;
margin-top:120px;
}

.layer{
position:absolute;
width:220px;
height:60px;
background:linear-gradient(to bottom,#ffc2d1,#ff8fab);
border-radius:14px;
}

.l1{ top:120px; }
.l2{ top:70px; }
.l3{ top:20px; }

.icing{
position:absolute;
top:10px;
width:220px;
height:25px;
background:white;
border-radius:12px;
}

.candle{
position:absolute;
top:-35px;
left:50%;
transform:translateX(-50%);
width:10px;
height:40px;
background:#ff4d6d;
}

.flame{
position:absolute;
top:-18px;
left:-2px;
width:14px;
height:18px;
background:radial-gradient(circle,yellow,orange,red);
border-radius:50%;
animation:flicker .2s infinite alternate;
}

@keyframes flicker{
from{transform:scale(1);}
to{transform:scale(1.2);}
}

</style>
</head>

<body>

<!-- INTRO SCREEN -->
<div id="intro">
<pre id="code"></pre>
</div>

<!-- MAIN PAGE -->
<div id="main">

<h1>Happy Birthday Ko Doi!</h1>
<p class="message">I made this program just for you ❤️</p>

<!-- YOUR PHOTOS -->
<img src="photo1.jpg" class="photo" id="p1">
<img src="photo2.jpg" class="photo" id="p2">
<img src="photo3.jpg" class="photo" id="p3">
<img src="photo4.jpg" class="photo" id="p4">

<!-- CAKE -->
<div class="cake">
<div class="layer l1"></div>
<div class="layer l2"></div>
<div class="layer l3"></div>
<div class="icing"></div>

<div class="candle">
<div class="flame"></div>
</div>

</div>

</div>

<script>

const lines = [
"Initializing system...",
"Accessing birthday database...",
"Loading memories...",
"Connecting to heart.exe",
"Preparing surprise...",
"Injecting happiness...",
"Finalizing...",
"",
"> Launching Birthday Program..."
];

let line = 0;
let char = 0;
const speed = 35;
const code = document.getElementById("code");

function typeEffect(){
if(line < lines.length){
if(char < lines[line].length){
code.innerHTML += lines[line].charAt(char);
char++;
setTimeout(typeEffect, speed);
}else{
code.innerHTML += "\n";
line++;
char = 0;
setTimeout(typeEffect, 200);
}
}else{
setTimeout(showMain, 800);
}
}

function showMain(){
document.getElementById("intro").style.display = "none";
document.getElementById("main").style.opacity = "1";
}

typeEffect();

</script>

</body>
</html>
